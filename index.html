<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SFC Rankings</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid white;
}

.rankings {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.fighter {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid #333;
    cursor: pointer;
    transition: 0.2s;
}

.fighter:hover {
    background: #111;
}

.champion {
    color: gold;
    font-weight: bold;
}

.rank {
    opacity: 0.7;
    margin-right: 10px;
}

.record-win {
    color: limegreen;
}

.record-loss {
    color: red;
}

.record-draw {
    color: white;
}

/* MODAL */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    width: 300px;
    border: 1px solid white;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}

.W {
    color: limegreen;
    font-weight: bold;
}

.L {
    color: red;
    font-weight: bold;
}

.D {
    color: white;
    font-weight: bold;
}

ul {
    padding-left: 20px;
}
</style>
</head>

<body>

<h1>SFC RANKINGS</h1>

<div class="rankings" id="list"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h3 id="name"></h3>
        <ul id="fights"></ul>
    </div>
</div>

<script>

function formatRecord(record) {
    const parts = record.split("-");

    const wins = parts[0];
    const losses = parts[1];
    const draws = parts[2];

    let html = `
        ${wins}<span class="record-win">W</span> -
        ${losses}<span class="record-loss">L</span>
    `;

    if (draws !== undefined) {
        html += ` - ${draws}<span class="record-draw">D</span>`;
    }

    return html;
}

const fighters = [
{
    name: "khornauli",
    record: "11-0-1",
    champ: true,
    fights: [
        "roman D",
        "gizo W KO",
        "kurati W KO",
        "luka W KO"
    ]
},
{
    name: "lazare",
    record: "6-0",
    champ: true,
    fights: [
        "gigani W DEC",
        "gigani W DEC",
        "kurati W DEC"
    ]
},
{
    name: "gigani",
    record: "5-2",
    champ: true,
    fights: [
        "lazare L DEC",
        "kurati W DEC",
        "kurati W DEC"
    ]
},
{
    name: "romana",
    record: "7-0-1",
    champ: false,
    fights: [
        "khornauli D",
        "nozadze W KO",
        "saba W DEC",
        "krilovi W DEC",
        "usaqmuri kai biwi W KO"
    ]
},
{
    name: "gocha",
    record: "1-0",
    champ: false,
    fights: [
        "kurati W DEC"
    ]
},
{
    name: "kurati",
    record: "0-5",
    champ: false,
    fights: [
        "khornauli L KO",
        "gocha L DEC",
        "gigani L DEC",
        "gigani L DEC",
        "lazare L DEC"
    ]
}
];

const list = document.getElementById("list");

fighters.forEach((fighter, index) => {

    const div = document.createElement("div");
    div.className = "fighter";

    div.innerHTML = `
        <div>
            <span class="rank">#${index + 1}</span>
            ${fighter.name}
        </div>

        <div>
            ${formatRecord(fighter.record)}
            ${fighter.champ ? '<span class="champion"> C</span>' : ''}
        </div>
    `;

    div.onclick = () => openModal(fighter);

    list.appendChild(div);
});

function openModal(fighter) {

    document.getElementById("modal").style.display = "flex";

    document.getElementById("name").innerText =
        `${fighter.name} (${fighter.record})`;

    const ul = document.getElementById("fights");

    ul.innerHTML = "";

    fighter.fights.forEach(fight => {

        let formattedFight = fight
            .replace(" W ", ' <span class="W">W</span> ')
            .replace(" L ", ' <span class="L">L</span> ')
            .replace(" D", ' <span class="D">D</span>');

        const li = document.createElement("li");

        li.innerHTML = formattedFight;

        ul.appendChild(li);
    });
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
